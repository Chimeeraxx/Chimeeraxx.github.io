{% extends "layout.html" %}

{% block title %}Edit Athlete {{ athlete.name }} ({{ athlete.id }}){% endblock %}
{% block body_class %}edit{% endblock %}

{% block content %}
    <h1>Edit Athlete {{ athlete.name }} ({{ athlete.id }})</h1>

    <form action="{{ url_for('athlete_edit', athlete_id=athlete.id) }}" method="post" class="edit-form">
        {% include "athlete/_form.html" %}
    </form>

    <ul class="action-list">
        <li>
            <a href="{{ url_for('athlete_index') }}">Back to list</a>
        </li>
        <li>
            <form action="{{ url_for('athlete_delete', athlete_id=athlete.id) }}" method="post">
                <input type="submit" value="Delete" onclick="return confirm('Are you sure?')">
            </form>
        </li>
    </ul>
{% endblock %}
