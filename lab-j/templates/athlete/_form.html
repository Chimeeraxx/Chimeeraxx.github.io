<div class="form-group">
    <label for="name">Name</label>
    <input
        type="text"
        id="name"
        name="name"
        value="{{ athlete.name if athlete else '' }}"
        required
    >
</div>

<div class="form-group">
    <label for="sport_name">Sport name</label>
    <input
        type="text"
        id="sport_name"
        name="sport_name"
        value="{{ athlete.sport_name if athlete else '' }}"
        required
    >
</div>

<div class="form-group">
    <label for="age">Age</label>
    <input
        type="number"
        id="age"
        name="age"
        value="{{ athlete.age if athlete else '' }}"
        required
    >
</div>

<div class="form-group">
    <label></label>
    <input type="submit" value="Submit">
</div>
