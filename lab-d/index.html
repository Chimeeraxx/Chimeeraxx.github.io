<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Marta Milka (57728) - PTW LAB D</title>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>
</head>
<body>
<div class="container">
    <header>
        <h1>Apokalipsa czy tylko mżawka?</h1>
        <p class="subtitle">Czas pokaże...</p>
    </header>

    <main>
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Wpisz nazwę miasta">
            <button id="weather-btn">Pogoda</button>
        </div>

        <section id="weather-results" class="hidden">
            <h2>Teraz:</h2>
            <div id="current-weather" class="weather-card current-card">
            </div>

            <h2>Prognoza:</h2>
            <div id="forecast-weather" class="forecast-container">
            </div>
        </section>
    </main>
</div>

</body>
</html>
